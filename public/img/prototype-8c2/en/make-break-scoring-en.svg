<svg viewBox="0 0 980 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Make/Break scoring flow</title>
  <desc id="desc">Flip-probability decomposition into make reward, break penalty, and novelty with a zero-break branch.</desc>
  <defs>
    <marker id="a1" markerWidth="6" markerHeight="6" refX="5.5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#22d3ee"/>
    </marker>
    <marker id="a2" markerWidth="6" markerHeight="6" refX="5.5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#94a3b8"/>
    </marker>
    <style>
      .bg { fill: #020617; }
      .txt { fill: #e2e8f0; font-family: 'Cascadia Code', 'JetBrains Mono', monospace; font-size: 14px; }
      .small { fill: #94a3b8; font-family: 'Cascadia Code', 'JetBrains Mono', monospace; font-size: 12px; }
      .halo { fill: #94a3b8; font-family: 'Cascadia Code', 'JetBrains Mono', monospace; font-size: 12px; stroke: #020617; stroke-width: 4; paint-order: stroke; }
      .bA { fill: #082f49; stroke: #38bdf8; stroke-width: 2; }
      .bB { fill: #1e293b; stroke: #64748b; stroke-width: 2; }
      .bG { fill: #052e2b; stroke: #34d399; stroke-width: 2; }
      .bO { fill: #3f2a00; stroke: #f59e0b; stroke-width: 2; }
      .bP { fill: #312e81; stroke: #a78bfa; stroke-width: 2; }
      .line { fill: none; stroke: #22d3ee; stroke-width: 2.2; marker-end: url(#a1); }
      .dash { fill: none; stroke: #94a3b8; stroke-width: 1.7; stroke-dasharray: 6 6; marker-end: url(#a2); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="980" height="560"/>

  <rect class="bA" x="340" y="24" width="300" height="72" rx="10"/>
  <text class="txt" x="490" y="52" text-anchor="middle">UNSAT clause C_i</text>
  <text class="small" x="490" y="74" text-anchor="middle">candidates v from clause literals</text>

  <rect class="bG" x="60" y="170" width="260" height="86" rx="10"/>
  <text class="txt" x="190" y="200" text-anchor="middle">Make reward</text>
  <text class="small" x="190" y="223" text-anchor="middle">(1 + alpha*make(v))</text>
  <text class="small" x="190" y="243" text-anchor="middle">more SAT clauses after the flip</text>

  <rect class="bO" x="360" y="170" width="260" height="86" rx="10"/>
  <text class="txt" x="490" y="200" text-anchor="middle">Break penalty</text>
  <text class="small" x="490" y="223" text-anchor="middle">(eps + break(v) + novelty(v))^(-c_b)</text>
  <text class="small" x="490" y="243" text-anchor="middle">penalty for losses and repeats</text>

  <rect class="bP" x="660" y="170" width="260" height="86" rx="10"/>
  <text class="txt" x="790" y="200" text-anchor="middle">Score p(v)</text>
  <text class="small" x="790" y="223" text-anchor="middle">p(v) ~ make_factor * break_factor</text>
  <text class="small" x="790" y="243" text-anchor="middle">stochastic variable selection</text>

  <rect class="bB" x="60" y="330" width="360" height="92" rx="10"/>
  <text class="txt" x="240" y="360" text-anchor="middle">Zero-break fast path</text>
  <text class="small" x="240" y="382" text-anchor="middle">if break(v)=0, choose randomly</text>
  <text class="small" x="240" y="402" text-anchor="middle">from zero-break candidates</text>

  <rect class="bA" x="560" y="330" width="360" height="92" rx="10"/>
  <text class="txt" x="740" y="360" text-anchor="middle">Flip + State update</text>
  <text class="small" x="740" y="382" text-anchor="middle">update SAT/UNSAT masks and counters</text>
  <text class="small" x="740" y="402" text-anchor="middle">proceed to the next iteration</text>

  <path class="line" d="M490 96 L490 170"/>
  <path class="line" d="M320 213 L360 213"/>
  <path class="line" d="M620 213 L660 213"/>
  <path class="line" d="M790 256 L790 330"/>

  <path class="dash" d="M490 96 L490 132 L30 132 L30 376 L60 376"/>
  <path class="dash" d="M420 376 L560 376"/>

  <text class="small" x="250" y="122">if ∃ v: break(v)=0</text>
  <text class="halo" x="460" y="362">fallback path</text>
</svg>
