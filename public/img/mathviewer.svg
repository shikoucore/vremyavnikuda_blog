<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B6FEF" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Фон -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bg)" />
  <!-- Блик -->
  <rect x="48" y="48" width="416" height="208" rx="80" fill="url(#shine)" />

  <!-- Σ (Sigma) — правильный символ -->
  <polyline
    points="358,166 154,166 256,256 154,346 358,346"
    stroke="#FFFFFF"
    stroke-width="40"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>